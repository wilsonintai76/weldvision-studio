name = "weldvision-studio"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages static build output
pages_build_output_dir = "./dist"

# Worker AI binding — provides access to @cf/meta/llama-3.3-70b-instruct
[ai]
binding = "AI"

# ── D1 Database — GMAW Sessions, Users, Bracket Calibration ───────────────────
[[d1_databases]]
binding = "DB"
database_name = "weldvision-gmaw-db"
database_id = "c1c1f0c2-8d97-4782-ad94-0ff2c2a837a5"
migrations_dir = "./migrations"

# ── R2 Bucket — 60 Hz GMAW Telemetry Archive ─────────────────────────────────
[[r2_buckets]]
binding = "TELEMETRY"
bucket_name = "weld-telemetry"
